<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Glass City Operator</title>

  <!-- PWA -->
  <link rel="manifest" href="/operator/manifest.json" />
  <meta name="theme-color" content="#0f1115" />

  <!-- iOS "Add to Home Screen" support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GC Operator" />
  <link rel="apple-touch-icon" href="/operator/icons/icon-180.png" />

  <link rel="icon" type="image/png" sizes="192x192" href="/operator/icons/icon-192.png" />
  <link rel="stylesheet" href="/operator/css/app.css" />
</head>
<body>
  <div id="app" aria-live="polite">
    <!-- Initial loading state; replaced by app.js once auth is resolved. -->
    <div class="screen center">
      <div class="brand">
        <img src="/operator/icons/icon-192.png" alt="" width="64" height="64" />
        <p class="muted">Loading…</p>
      </div>
    </div>
  </div>

  <!-- ── Login view ──────────────────────────────────────────────────── -->
  <template id="tpl-login">
    <div class="screen center">
      <form class="card auth-card" autocomplete="on" novalidate>
        <div class="brand">
          <img src="/operator/icons/icon-192.png" alt="Glass City Trailer Rentals" width="72" height="72" />
          <h1>Operator Login</h1>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" inputmode="email" autocomplete="username"
                 autocapitalize="off" autocorrect="off" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <p class="error" data-error hidden></p>

        <button type="submit" class="btn btn-primary" data-submit>Log in</button>
      </form>
    </div>
  </template>

  <!-- ── Dashboard view ─────────────────────────────────────────────── -->
  <template id="tpl-dashboard">
    <header class="topbar">
      <span class="topbar-title">Dashboard</span>
      <button type="button" class="btn btn-ghost" data-logout>Log out</button>
    </header>

    <main class="screen content">
      <p class="muted welcome" data-welcome></p>

      <nav class="nav-list">
        <button type="button" class="nav-item" data-nav="schedule">
          <span class="nav-icon" aria-hidden="true">📅</span>
          <span class="nav-text">
            <span class="nav-label">Schedule</span>
            <span class="nav-sub muted">Day-by-day, by trailer</span>
          </span>
          <span class="nav-chevron" aria-hidden="true">›</span>
        </button>
        <button type="button" class="nav-item" data-nav="calendar" data-admin hidden>
          <span class="nav-icon" aria-hidden="true">🗓️</span>
          <span class="nav-text">
            <span class="nav-label">Calendar</span>
            <span class="nav-sub muted">Month &amp; week · block dates</span>
          </span>
          <span class="nav-chevron" aria-hidden="true">›</span>
        </button>
        <button type="button" class="nav-item" data-nav="inventory" data-admin hidden>
          <span class="nav-icon" aria-hidden="true">🚚</span>
          <span class="nav-text">
            <span class="nav-label">Inventory</span>
            <span class="nav-sub muted">Trailers, status &amp; pricing</span>
          </span>
          <span class="nav-chevron" aria-hidden="true">›</span>
        </button>
        <button type="button" class="nav-item" data-nav="accounts" data-admin hidden>
          <span class="nav-icon" aria-hidden="true">👥</span>
          <span class="nav-text">
            <span class="nav-label">Accounts</span>
            <span class="nav-sub muted">Operators &amp; admins</span>
          </span>
          <span class="nav-chevron" aria-hidden="true">›</span>
        </button>
        <button type="button" class="nav-item" data-nav="diagnostics" data-admin hidden>
          <span class="nav-icon" aria-hidden="true">🩺</span>
          <span class="nav-text">
            <span class="nav-label">Diagnostics</span>
            <span class="nav-sub muted">Integrations &amp; test email</span>
          </span>
          <span class="nav-chevron" aria-hidden="true">›</span>
        </button>
        <button type="button" class="nav-item" data-nav="reports" data-reports hidden>
          <span class="nav-icon" aria-hidden="true">📊</span>
          <span class="nav-text">
            <span class="nav-label">Reports</span>
            <span class="nav-sub muted">Revenue &amp; statements</span>
          </span>
          <span class="nav-chevron" aria-hidden="true">›</span>
        </button>
        <button type="button" class="nav-item" data-nav="audit" data-reports hidden>
          <span class="nav-icon" aria-hidden="true">📜</span>
          <span class="nav-text">
            <span class="nav-label">Audit Log</span>
            <span class="nav-sub muted">Who did what, when</span>
          </span>
          <span class="nav-chevron" aria-hidden="true">›</span>
        </button>
      </nav>

      <p class="error" data-error hidden></p>

      <section class="card notif-card" data-notif hidden>
        <h2>Alerts on this device</h2>
        <p class="muted" data-notif-status>Checking…</p>
        <div class="notif-actions">
          <button type="button" class="btn btn-primary" data-notif-enable hidden>Enable alerts</button>
          <button type="button" class="btn btn-ghost" data-notif-test hidden>Send test</button>
          <button type="button" class="btn btn-ghost" data-notif-disable hidden>Turn off</button>
        </div>
        <p class="error" data-notif-error hidden></p>
      </section>

      <p class="empty" data-dash-empty hidden>Nothing scheduled today, and nothing out.</p>

      <section class="card sec sec-pickups" data-section="pickups" hidden>
        <h2 class="sec-title">Pickups Today <span class="count" data-count="pickups"></span></h2>
        <ul class="booking-list" data-list="pickups"></ul>
      </section>

      <section class="card sec sec-deliveries" data-section="dropoffs" hidden>
        <h2 class="sec-title">Deliveries Today <span class="count" data-count="dropoffs"></span></h2>
        <ul class="booking-list" data-list="dropoffs"></ul>
      </section>

      <section class="card" data-section="retrievals" hidden>
        <h2>Deliveries — Retrievals Today <span class="count" data-count="retrievals"></span></h2>
        <ul class="booking-list" data-list="retrievals"></ul>
      </section>

      <section class="card" data-section="returns" hidden>
        <h2>Returns Today <span class="count" data-count="returns"></span></h2>
        <ul class="booking-list" data-list="returns"></ul>
      </section>

      <section class="card" data-section="active" hidden>
        <h2>Active Rentals <span class="count" data-count="active"></span></h2>
        <ul class="booking-list" data-list="active"></ul>
      </section>
    </main>
  </template>

  <!-- A single booking row (cloned into dashboard + schedule lists). -->
  <template id="tpl-booking-row">
    <li class="booking-row">
      <button type="button" class="booking-open" data-open>
        <span class="booking-stripe" data-stripe aria-hidden="true"></span>
        <span class="booking-meta">
          <span class="booking-name" data-customer></span>
          <span class="booking-sub muted" data-trailer></span>
          <span class="booking-sub muted" data-address hidden></span>
          <span class="booking-sub muted" data-when></span>
        </span>
        <span class="booking-tail">
          <span class="badge badge-fulfillment" data-fulfillment></span>
          <span class="badge" data-badge></span>
          <span class="booking-phone muted" data-phone></span>
        </span>
      </button>
    </li>
  </template>

  <!-- ── Booking detail view ────────────────────────────────────────── -->
  <template id="tpl-booking-detail">
    <header class="topbar">
      <button type="button" class="btn btn-ghost" data-back>‹ Back</button>
      <span class="topbar-title">Booking</span>
      <span class="topbar-spacer"></span>
    </header>

    <main class="screen content">
      <p class="empty" data-loading>Loading…</p>
      <p class="error" data-error hidden></p>

      <div data-detail hidden>
        <section class="card detail-head">
          <div class="status-row">
            <span class="ref" data-ref></span>
            <span class="badge" data-badge></span>
          </div>
          <h2 data-customer></h2>
          <a class="phone-link" data-phone-link>
            <span data-phone></span>
          </a>
        </section>

        <section class="card">
          <dl class="kv">
            <div><dt>Trailer</dt><dd data-trailer></dd></div>
            <div><dt>Fulfillment</dt><dd data-fulfillment></dd></div>
            <div><dt>Requested time</dt><dd data-reqtime></dd></div>
            <div data-deliver-row hidden><dt>Deliver to</dt><dd data-deliver></dd></div>
            <div data-arrive-row hidden><dt>Customer arriving at</dt><dd data-arrive></dd></div>
            <div><dt>Pickup</dt><dd data-start></dd></div>
            <div><dt>Return</dt><dd data-end></dd></div>
            <div><dt>Total paid</dt><dd data-paid></dd></div>
            <div data-notes-row hidden><dt>Customer notes</dt><dd data-notes></dd></div>
            <div data-opnotes-row hidden><dt>Operator notes</dt><dd data-opnotes></dd></div>
          </dl>
          <a class="btn btn-ghost contract-btn" data-contract target="_blank" rel="noopener" hidden>
            View signed contract (PDF)
          </a>
        </section>

        <section class="card">
          <p class="error" data-action-error hidden></p>
          <button type="button" class="btn btn-primary" data-pickup hidden>Mark Picked Up</button>
          <button type="button" class="btn btn-primary" data-return hidden>Mark Returned</button>
          <p class="muted done-note" data-done hidden></p>
          <p class="muted attribution" data-attribution hidden></p>
        </section>
      </div>
    </main>
  </template>

  <!-- ── Schedule view ──────────────────────────────────────────────── -->
  <template id="tpl-schedule">
    <header class="topbar">
      <button type="button" class="btn btn-ghost" data-back>‹ Back</button>
      <span class="topbar-title">Schedule</span>
      <span class="topbar-spacer"></span>
    </header>

    <main class="screen content">
      <div class="card date-bar">
        <button type="button" class="btn btn-ghost step" data-prev aria-label="Previous day">‹</button>
        <input type="date" class="date-input" data-date aria-label="Schedule date" />
        <button type="button" class="btn btn-ghost step" data-next aria-label="Next day">›</button>
      </div>
      <p class="muted day-label" data-day-label></p>

      <p class="empty" data-loading>Loading…</p>
      <p class="error" data-error hidden></p>
      <ul class="booking-list" data-list hidden></ul>
      <p class="empty" data-empty hidden>No bookings on this day.</p>
    </main>
  </template>

  <!-- ── Inventory view ─────────────────────────────────────────────── -->
  <template id="tpl-inventory">
    <header class="topbar">
      <button type="button" class="btn btn-ghost" data-back>‹ Back</button>
      <span class="topbar-title">Inventory</span>
      <span class="topbar-spacer"></span>
    </header>

    <main class="screen content">
      <p class="empty" data-loading>Loading fleet…</p>
      <p class="error" data-error hidden></p>
      <ul class="trailer-list" data-list hidden></ul>
    </main>
  </template>

  <!-- Single row in the inventory list (cloned per trailer). -->
  <template id="tpl-trailer-row">
    <li class="trailer-row">
      <button type="button" class="trailer-open" data-open>
        <img class="thumb" data-thumb alt="" width="64" height="64" />
        <span class="trailer-meta">
          <span class="trailer-name" data-name></span>
          <span class="trailer-sub muted" data-sub></span>
        </span>
        <span class="badge" data-badge></span>
      </button>
      <div class="unit-bar">
        <span class="unit-stats" data-units></span>
        <span class="unit-hold">
          <span class="unit-hold-lbl muted">On hold</span>
          <button type="button" class="unit-step" data-hold-dec aria-label="Decrease units on hold">−</button>
          <span class="unit-hold-val" data-hold>0</span>
          <button type="button" class="unit-step" data-hold-inc aria-label="Increase units on hold">+</button>
        </span>
      </div>
      <button type="button" class="btn btn-toggle" data-toggle></button>
    </li>
  </template>

  <!-- ── Trailer detail view ────────────────────────────────────────── -->
  <template id="tpl-trailer-detail">
    <header class="topbar">
      <button type="button" class="btn btn-ghost" data-back>‹ Back</button>
      <span class="topbar-title">Trailer</span>
      <span class="topbar-spacer"></span>
    </header>

    <main class="screen content">
      <img class="detail-photo" data-photo alt="" hidden />

      <section class="card detail-head">
        <h2 data-title>Trailer</h2>
        <p class="muted" data-typeline></p>
        <div class="status-row">
          <span class="badge" data-badge></span>
          <button type="button" class="btn btn-toggle" data-toggle></button>
        </div>
      </section>

      <form class="card detail-form" data-form novalidate>
        <h2>Details</h2>
        <!-- Fields are injected by app.js based on trailer type. -->
        <div class="fields" data-fields></div>
        <p class="error" data-error hidden></p>
        <p class="saved muted" data-saved hidden>Saved.</p>
        <button type="submit" class="btn btn-primary" data-save>Save changes</button>
      </form>
    </main>
  </template>

  <!-- ── Calendar view ──────────────────────────────────────────────── -->
  <template id="tpl-calendar">
    <header class="topbar">
      <button type="button" class="btn btn-ghost" data-back>‹ Back</button>
      <span class="topbar-title">Calendar</span>
      <span class="topbar-spacer"></span>
    </header>

    <main class="screen content">
      <div class="card cal-bar">
        <button type="button" class="btn btn-ghost step" data-prev aria-label="Previous">‹</button>
        <span class="cal-title" data-title></span>
        <button type="button" class="btn btn-ghost step" data-next aria-label="Next">›</button>
      </div>

      <div class="cal-toolbar">
        <div class="seg" role="group" aria-label="Calendar view mode">
          <button type="button" class="seg-btn" data-mode="month" aria-pressed="true">Month</button>
          <button type="button" class="seg-btn" data-mode="week" aria-pressed="false">Week</button>
        </div>
        <button type="button" class="btn btn-ghost" data-manage>Manage blackouts</button>
      </div>

      <p class="error" data-error hidden></p>
      <p class="empty" data-loading>Loading…</p>
      <div class="cal-grid" data-grid hidden></div>

      <div class="cal-legend" data-legend hidden>
        <span><span class="sw sw-book" aria-hidden="true"></span>Booked</span>
        <span><span class="sw sw-block" aria-hidden="true"></span>Blocked</span>
      </div>

      <section class="card cal-day-panel" data-day-panel hidden>
        <div class="status-row">
          <h2 data-day-title></h2>
          <button type="button" class="btn btn-ghost" data-block-day>Block</button>
        </div>
        <ul class="blackout-list" data-day-blackouts></ul>
        <ul class="booking-list" data-day-bookings></ul>
        <p class="empty" data-day-empty hidden>Nothing scheduled this day.</p>
      </section>
    </main>
  </template>

  <!-- ── Blackouts management ───────────────────────────────────────── -->
  <template id="tpl-blackouts">
    <header class="topbar">
      <button type="button" class="btn btn-ghost" data-back>‹ Back</button>
      <span class="topbar-title">Blackouts</span>
      <span class="topbar-spacer"></span>
    </header>

    <main class="screen content">
      <form class="card detail-form" data-form novalidate>
        <h2>Block dates</h2>
        <div class="fields">
          <div class="field">
            <label for="bo-trailer">Trailer</label>
            <select id="bo-trailer" data-trailer>
              <option value="">All trailers (whole fleet)</option>
            </select>
          </div>
          <div class="field">
            <label for="bo-start">From</label>
            <input id="bo-start" type="date" class="date-input" data-start />
          </div>
          <div class="field">
            <label for="bo-end">To</label>
            <input id="bo-end" type="date" class="date-input" data-end />
          </div>
          <div class="field">
            <label for="bo-reason">Reason (optional)</label>
            <input id="bo-reason" type="text" data-reason maxlength="200"
                   placeholder="Maintenance, vacation…" />
          </div>
        </div>
        <p class="error" data-error hidden></p>
        <p class="saved muted" data-saved hidden>Dates blocked.</p>
        <button type="submit" class="btn btn-primary" data-save>Block these dates</button>
      </form>

      <section class="card">
        <h2>Current blackouts</h2>
        <p class="empty" data-loading>Loading…</p>
        <p class="error" data-list-error hidden></p>
        <ul class="blackout-list" data-list hidden></ul>
        <p class="empty" data-empty hidden>No blackouts set.</p>
      </section>
    </main>
  </template>

  <!-- A single blackout row (calendar day panel + blackouts list). -->
  <template id="tpl-blackout-row">
    <li class="blackout-row">
      <span class="blackout-meta">
        <span class="blackout-trailer" data-trailer></span>
        <span class="blackout-when muted" data-when></span>
        <span class="blackout-reason muted" data-reason></span>
      </span>
      <button type="button" class="btn btn-ghost blackout-del" data-del>Remove</button>
    </li>
  </template>

  <!-- ── Accounts (admin) ───────────────────────────────────────────── -->
  <template id="tpl-accounts">
    <header class="topbar">
      <button type="button" class="btn btn-ghost" data-back>‹ Back</button>
      <span class="topbar-title">Accounts</span>
      <span class="topbar-spacer"></span>
    </header>

    <main class="screen content">
      <button type="button" class="btn btn-primary" data-add>+ Add Operator</button>
      <p class="empty" data-loading>Loading…</p>
      <p class="error" data-error hidden></p>
      <ul class="account-list" data-list hidden></ul>
    </main>
  </template>

  <!-- A single account row. -->
  <template id="tpl-account-row">
    <li class="account-row">
      <button type="button" class="account-open" data-open>
        <span class="account-meta">
          <span class="account-name" data-name></span>
          <span class="account-sub muted" data-contact></span>
          <span class="account-sub muted" data-login></span>
        </span>
        <span class="account-tail">
          <span class="badge" data-role></span>
          <span class="badge" data-active></span>
        </span>
      </button>
    </li>
  </template>

  <!-- ── Account create / edit form (admin) ─────────────────────────── -->
  <template id="tpl-account-form">
    <header class="topbar">
      <button type="button" class="btn btn-ghost" data-back>‹ Back</button>
      <span class="topbar-title" data-title>Account</span>
      <span class="topbar-spacer"></span>
    </header>

    <main class="screen content">
      <form class="card detail-form" data-form novalidate>
        <h2 data-formtitle>New Operator</h2>
        <div class="fields">
          <div class="field">
            <label for="ac-name">Name</label>
            <input id="ac-name" type="text" data-name autocomplete="off" />
          </div>
          <div class="field" data-email-field>
            <label for="ac-email">Email</label>
            <input id="ac-email" type="email" data-email inputmode="email" autocomplete="off" autocapitalize="off" />
          </div>
          <div class="field">
            <label for="ac-phone">Phone</label>
            <input id="ac-phone" type="tel" data-phone inputmode="tel" autocomplete="off" />
          </div>
          <div class="field">
            <label for="ac-role">Role</label>
            <select id="ac-role" data-role>
              <option value="operator">Operator</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="field">
            <label for="ac-password" data-pw-label>Temporary password</label>
            <input id="ac-password" type="text" data-password autocomplete="off" placeholder="At least 8 characters" />
            <p class="muted" data-pw-hint hidden>Leave blank to keep the current password.</p>
          </div>
        </div>
        <p class="error" data-error hidden></p>
        <p class="saved muted" data-saved hidden>Saved.</p>
        <button type="submit" class="btn btn-primary" data-save>Create operator</button>
      </form>

      <section class="card" data-danger hidden>
        <h2>Danger zone</h2>
        <p class="muted" data-danger-note></p>
        <button type="button" class="btn btn-toggle btn-danger" data-deactivate>Deactivate account</button>
      </section>
    </main>
  </template>

  <!-- ── Diagnostics (admin) ────────────────────────────────────────── -->
  <template id="tpl-diagnostics">
    <header class="topbar">
      <button type="button" class="btn btn-ghost" data-back>‹ Back</button>
      <span class="topbar-title">Diagnostics</span>
      <span class="topbar-spacer"></span>
    </header>

    <main class="screen content">
      <section class="card">
        <h2>Integrations</h2>
        <p class="empty" data-loading>Loading…</p>
        <p class="error" data-error hidden></p>
        <dl class="kv diag-list" data-integrations hidden></dl>
      </section>

      <section class="card">
        <h2>Send test email</h2>
        <p class="muted">Sends a one-off email so you can confirm Resend works (and the sending domain is verified).</p>
        <div class="field">
          <label for="te-email">To</label>
          <input id="te-email" type="email" data-email inputmode="email" autocomplete="off" />
        </div>
        <p class="error" data-test-error hidden></p>
        <p class="saved muted" data-test-ok hidden></p>
        <button type="button" class="btn btn-primary" data-send>Send test email</button>
      </section>

      <section class="card">
        <h2>Test notifications</h2>
        <p class="muted">Push goes to <strong>this device</strong> — enable alerts on the Dashboard first.</p>
        <button type="button" class="btn btn-ghost" data-send-push>Send test push</button>
        <p class="error" data-push-error hidden></p>
        <p class="saved muted" data-push-ok hidden></p>

        <div class="field" style="margin-top:16px;">
          <label for="ts-phone">SMS to</label>
          <input id="ts-phone" type="tel" data-phone inputmode="tel" autocomplete="off"
                 placeholder="+14195551234 (blank = OPERATOR_PHONE)" />
        </div>
        <button type="button" class="btn btn-ghost" data-send-sms>Send test SMS</button>
        <p class="error" data-sms-error hidden></p>
        <p class="saved muted" data-sms-ok hidden></p>
      </section>
    </main>
  </template>

  <!-- ── Reports (admin + owner) ────────────────────────────────────── -->
  <template id="tpl-reports">
    <header class="topbar">
      <button type="button" class="btn btn-ghost" data-back>‹ Back</button>
      <span class="topbar-title">Reports</span>
      <span class="topbar-spacer"></span>
    </header>

    <main class="screen content">
      <div class="card date-bar">
        <label class="sr-only" for="rep-month">Month</label>
        <input type="month" id="rep-month" class="date-input" data-month />
      </div>
      <p class="empty" data-loading>Loading…</p>
      <p class="error" data-error hidden></p>

      <div data-report hidden>
        <div class="stat-grid" data-summary></div>

        <section class="card" data-gen-card hidden>
          <h2>Statement</h2>
          <div class="notif-actions">
            <button type="button" class="btn btn-primary" data-generate>Generate &amp; email statement</button>
            <button type="button" class="btn btn-ghost" data-csv>Download CSV</button>
          </div>
          <p class="error" data-gen-error hidden></p>
          <p class="saved muted" data-gen-ok hidden></p>
        </section>

        <section class="card">
          <h2>Revenue by trailer</h2>
          <ul class="rep-list" data-by-trailer></ul>
          <p class="empty" data-bt-empty hidden>No revenue in this period.</p>
        </section>

        <section class="card">
          <h2>Bookings <span class="count" data-bk-count></span></h2>
          <ul class="rep-list" data-bookings></ul>
          <p class="empty" data-bk-empty hidden>No paid bookings in this period.</p>
        </section>
      </div>
    </main>
  </template>

  <!-- ── Audit log (admin + owner) ──────────────────────────────────── -->
  <template id="tpl-audit">
    <header class="topbar">
      <button type="button" class="btn btn-ghost" data-back>‹ Back</button>
      <span class="topbar-title">Audit Log</span>
      <span class="topbar-spacer"></span>
    </header>

    <main class="screen content">
      <div class="card">
        <div class="field-row two">
          <div><label class="fl" for="au-from">From</label><input type="date" id="au-from" class="date-input" data-from /></div>
          <div><label class="fl" for="au-to">To</label><input type="date" id="au-to" class="date-input" data-to /></div>
        </div>
        <div class="field" style="margin-top:10px;">
          <label class="fl" for="au-operator">Operator</label>
          <select id="au-operator" data-operator><option value="">All operators</option></select>
        </div>
        <div class="field" style="margin-top:10px;">
          <label class="fl" for="au-action">Action</label>
          <select id="au-action" data-action><option value="">All actions</option></select>
        </div>
        <button type="button" class="btn btn-ghost" style="margin-top:12px;" data-apply>Apply filters</button>
      </div>

      <p class="empty" data-loading>Loading…</p>
      <p class="error" data-error hidden></p>
      <ul class="audit-list" data-list></ul>
      <p class="empty" data-empty hidden>No matching audit entries.</p>
      <button type="button" class="btn btn-ghost" data-more hidden>Load more</button>
    </main>
  </template>

  <script src="/operator/js/api.js"></script>
  <script src="/operator/js/push.js"></script>
  <script src="/operator/js/app.js"></script>
</body>
</html>
